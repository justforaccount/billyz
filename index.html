<script>
// ── SOUND ENGINE (Web Audio API) ──────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudio(){
  if(!audioCtx){ try{ audioCtx = new AudioCtx(); }catch(e){ return null; } }
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(freq, type, vol, duration, freqEnd, attack=0.005, decay=0.05){
  const ac = getAudio(); if(!ac) return;
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.connect(gain); gain.connect(ac.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ac.currentTime);
  if(freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, ac.currentTime + duration);
  gain.gain.setValueAtTime(0, ac.currentTime);
  gain.gain.linearRampToValueAtTime(vol, ac.currentTime + attack);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
  osc.start(ac.currentTime);
  osc.stop(ac.currentTime + duration + 0.05);
}

function playNoise(vol, duration, filterFreq=2000){
  const ac = getAudio(); if(!ac) return;
  const bufSize = ac.sampleRate * duration;
  const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
  const data = buf.getChannelData(0);
  for(let i=0;i<bufSize;i++) data[i] = Math.random()*2-1;
  const src = ac.createBufferSource();
  src.buffer = buf;
  const filter = ac.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = filterFreq;
  filter.Q.value = 1.5;
  const gain = ac.createGain();
  src.connect(filter); filter.connect(gain); gain.connect(ac.destination);
  gain.gain.setValueAtTime(vol, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
  src.start(); src.stop(ac.currentTime + duration + 0.05);
}

function getBossTips(){
  if(!boss||!boss.alive) return [];
  const bd=BLADES[11]; // lv12

  const res=[];
  for(let i=0;i<boss.bladeCount;i++){

    res.push({x:boss.x+Math.cos(a)*R, y:boss.y+Math.sin(a)*R});

function tips(e){
  if(e.bladeLevel>=13)return[];
  const bd=BLADES[e.bladeLevel-1],R=e.r+bd.R,res=[];
  for(let i=0;i<e.bladeCount;i++){const a=e.orbitAngle+(i/e.bladeCount)*Math.PI*2;res.push({x:e.x+Math.cos(a)*R,y:e.y+Math.sin(a)*R});}
  return res;
}
function tipHitsBody(att,def){
  const ts=tips(att),r2=(def.r+8)*(def.r+8);
  for(const t of ts){const dx=t.x-def.x,dy=t.y-def.y;if(dx*dx+dy*dy<r2)return true;}
  return false;
}
function tipHitsTips(a,b){
  const at=tips(a),bt=tips(b);
  for(const p of at)for(const q of bt){const dx=p.x-q.x,dy=p.y-q.y;if(dx*dx+dy*dy<22*22)return true;}
  return false;
}

function killEntity(e,byPlayer,upgradeOnKill){
  e.alive=false;
  spawnFx(e.x,e.y,BLADES[e.bladeLevel-1].c,14);
  if(byPlayer){
    kills++;
    score+=BLADES[e.bladeLevel-1].lv*100;
    SFX.kill();
    if(upgradeOnKill&&player.bladeLevel<MAX_LV){
      player.bladeLevel=Math.min(MAX_LV,player.bladeLevel+1);
      playerMaxLevel=Math.max(playerMaxLevel,player.bladeLevel);
      SFX.levelUp();
  if(player.bladeLevel===13){showWin();}
    }
  }
  // Drop 5 blades on kill, always capped at lv12 (no dart drops)
  const pLv = player ? player.bladeLevel : 1;
  const dropLv = Math.min(12, e.bladeLevel > pLv ? e.bladeLevel : pLv);
  for(let k=0;k<5;k++) droppedBlades.push(makeDrop(e.x,e.y,dropLv));
  updateHUD();
}

function drawEntity(e,isPlayer){
  const sx=e.x-cam.x,sy=e.y-cam.y;
  const cullM=isDartMode?Math.max(W,H):160;
  if(sx<-cullM||sx>W+cullM||sy<-cullM||sy>H+cullM)return;
  const bd=BLADES[e.bladeLevel-1];
  const isStronger=!isPlayer&&e.bladeLevel>player.bladeLevel;
  ctx.save();
  ctx.shadowColor=isStronger?'rgba(255,0,0,0.8)':bd.g;
  ctx.shadowBlur=isStronger?22:9;
  ctx.beginPath();ctx.arc(sx,sy,e.r,0,Math.PI*2);
  const g=ctx.createRadialGradient(sx-4,sy-5,2,sx,sy,e.r);
  g.addColorStop(0,isPlayer?'#fff':'#fde8c8');g.addColorStop(1,isPlayer?'#999':'#b06030');
  ctx.fillStyle=g;ctx.fill();
  ctx.strokeStyle=isStronger?'#ff1111':bd.c;ctx.lineWidth=isStronger?4:2;ctx.stroke();
  ctx.restore();
  // Eyes
  let edx=0,edy=0;
  if(isPlayer){const jl=Math.sqrt(jDelta.x*jDelta.x+jDelta.y*jDelta.y);if(jl>0.05){edx=jDelta.x/jl;edy=jDelta.y/jl;} else {const kx=keys.d-keys.a,ky=keys.s-keys.w,kl=Math.sqrt(kx*kx+ky*ky);if(kl>0){edx=kx/kl;edy=ky/kl;}}}
  else{const vl=Math.sqrt(e.vx*e.vx+e.vy*e.vy);if(vl>0.1){edx=e.vx/vl;edy=e.vy/vl;}}
  ctx.save();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sx+5,sy-3,4.2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(sx-3,sy-3,4.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(sx+5+edx*3.2,sy-3+edy*3.2,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(sx-3+edx*3.2,sy-3+edy*3.2,2.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.8)';ctx.beginPath();ctx.arc(sx+5+edx*3.2+1.2,sy-3+edy*3.2-1,1,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(sx-3+edx*3.2+1.2,sy-3+edy*3.2-1,1,0,Math.PI*2);ctx.fill();
  ctx.restore();
  if(!isPlayer){
    ctx.save();ctx.font='bold 10px Arial';ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillStyle=isStronger?'#ff5555':bd.c;ctx.shadowColor=bd.g;ctx.shadowBlur=4;
    ctx.fillText('Lv'+e.bladeLevel+(e.bladeCount>1?' ×'+e.bladeCount:''),sx,sy-e.r-3);ctx.restore();
  }
  drawEntityBlades(e,sx,sy);
  // Lv13 aura
  if(isPlayer&&e.bladeLevel===13){
    ctx.save();const t=Date.now()*0.003;
    ctx.shadowColor='#3355ff';ctx.shadowBlur=30;ctx.strokeStyle='rgba(80,120,255,0.4)';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(sx,sy,e.r+20+Math.sin(t)*5,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }
}

// Darts (level 13 weapon)
// ── DART SYSTEM ──────────────────────────────────────────────
// 3 fixed darts orbit player when idle, hunt enemies when in range
const NUM_DARTS=5;
const DART_ORBIT_R=70;
const DART_ORBIT_SPD=2.2;
const DART_HUNT_SPD=55;
const DART_HUNT_RANGE=400;

function initDarts(){
  darts=[];
  for(let i=0;i<NUM_DARTS;i++){
    darts.push({
      x:player.x,y:player.y,
      vx:0,vy:0,
      orbitAngle:(i/NUM_DARTS)*Math.PI*2,
      target:null,
      state:'orbit', // 'orbit' | 'hunt' | 'return'
      trail:[],
      mustReturn:false, // must orbit player once before hitting boss again
    });
  }
}

function findDartTarget(dart){
  // Boss takes priority - but not during invincible, and not if dart must return first
  if(boss&&boss.alive&&!boss.invincible&&!(dart&&dart.mustReturn)) return boss;
  // Nearest alive enemy in range (not already targeted)
  const targeted=new Set(darts.filter(d=>d.target&&d.target.alive&&d.target!==boss).map(d=>d.target));
  let best=null,bestD=Infinity;
  enemies.forEach(e=>{
    if(!e.alive||targeted.has(e))return;
    const dx=e.x-player.x,dy=e.y-player.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<DART_HUNT_RANGE&&d<bestD){bestD=d;best=e;}
  });
  return best;
}

function updateDarts(dt){
  // Orbit angle advances
  darts.forEach((d,i)=>{
    // Store trail
    d.trail.push({x:d.x,y:d.y});
    if(d.trail.length>28)d.trail.shift();

    if(d.state==='orbit'){
      // Assign target if available
      const t=findDartTarget(d);
      if(t){d.target=t;d.state='hunt';SFX.dartFire();}
      // Orbit around player
      d.orbitAngle+=(DART_ORBIT_SPD+i*0.3)*dt*Math.PI;
      const tx=player.x+Math.cos(d.orbitAngle)*DART_ORBIT_R;
      const ty=player.y+Math.sin(d.orbitAngle)*DART_ORBIT_R;
      d.x+=(tx-d.x)*0.25;d.y+=(ty-d.y)*0.25;
    } else if(d.state==='hunt'){
      if(!d.target||!d.target.alive){
        // Target dead, find new or return
        const t=findDartTarget(d);
        if(t){d.target=t;}
        else{d.target=null;d.state='return';}
      }
      if(d.target&&d.target.alive){
        const dx=d.target.x-d.x,dy=d.target.y-d.y,dist=Math.sqrt(dx*dx+dy*dy);
        if(dist>1){d.x+=dx/dist*DART_HUNT_SPD;d.y+=dy/dist*DART_HUNT_SPD;}
        // Hit!
        if(dist<d.target.r+10){
          if(d.target===boss){
            // Boss: damage only (handled in boss section above)
            // skip here, boss dart hit logic is in boss update block
          } else {
            spawnExplosion(d.target.x,d.target.y);
            SFX.dartKill();
            killEntity(d.target,true,false);
            d.target=null;
            const next=findDartTarget();
            if(next){d.target=next;}
            else{d.state='return';}
          }
        }
      }
    } else { // return
      const t=findDartTarget(d);
      if(t){d.target=t;d.state='hunt';}
      else{
        // Fly back to orbit position
        d.orbitAngle+=(DART_ORBIT_SPD+i*0.3)*dt*Math.PI;
        const tx=player.x+Math.cos(d.orbitAngle)*DART_ORBIT_R;
        const ty=player.y+Math.sin(d.orbitAngle)*DART_ORBIT_R;
        const dx=tx-d.x,dy=ty-d.y,dist=Math.sqrt(dx*dx+dy*dy);
        if(dist>2){d.x+=dx/dist*DART_HUNT_SPD*0.7;d.y+=dy/dist*DART_HUNT_SPD*0.7;}
        else{d.state='orbit';d.mustReturn=false;}
      }
    }
  });
}

function drawDarts(){
  if(!darts.length)return;
  darts.forEach(d=>{
    // Red thin trail only - no body
    const tlen=d.trail.length;
    for(let i=1;i<tlen;i++){
      const a=i/tlen;
      const pt=d.trail[i],pp=d.trail[i-1];
      ctx.save();
      ctx.globalAlpha=a*0.9;
      ctx.strokeStyle=`rgba(255,${Math.floor(a*60)},${Math.floor(a*30)},${a})`;
      ctx.lineWidth=0.8+a*1.8;
      ctx.shadowColor='#ff2200';
      ctx.shadowBlur=6*a;
      ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(pp.x-cam.x,pp.y-cam.y);
      ctx.lineTo(pt.x-cam.x,pt.y-cam.y);
      ctx.stroke();
      ctx.restore();
    }
    // Tiny red glow dot at head
    if(tlen>0){
      const last=d.trail[tlen-1];
      ctx.save();
      ctx.shadowColor='#ff4422';ctx.shadowBlur=14;
      ctx.fillStyle='rgba(255,120,80,0.95)';
      ctx.beginPath();ctx.arc(last.x-cam.x,last.y-cam.y,2.5,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
  });
}

function drawWarnings(){
  if(!player)return;
  const arcR=player.r+50;
  const warnDist=380;
  enemies.forEach(e=>{
    if(!e.alive)return;
    const dx=e.x-player.x,dy=e.y-player.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>warnDist)return;
    const intensity=Math.pow(1-dist/warnDist,1.4),angle=Math.atan2(dy,dx);
    ctx.save();ctx.globalAlpha=0.65*intensity;ctx.strokeStyle='#ff2222';ctx.lineWidth=5+intensity*6;
    ctx.shadowColor='#ff0000';ctx.shadowBlur=16*intensity;ctx.lineCap='round';
    // Screen center in zoomed space
    ctx.beginPath();ctx.arc(W/2,H/2,arcR,angle-0.4,angle+0.4);ctx.stroke();ctx.restore();
  });
}

function drawWorld(){
  // Fill extra large to cover zoom-out bleed
  const extra=isDartMode?500:0;

  const gs=80,ox=(-cam.x)%gs,oy=(-cam.y)%gs;
  ctx.strokeStyle='rgba(255,255,255,0.02)';ctx.lineWidth=1;
  const extra2=isDartMode?600:0;
  for(let x=ox-extra2;x<W+extra2;x+=gs){ctx.beginPath();ctx.moveTo(x,-extra2);ctx.lineTo(x,H+extra2);ctx.stroke();}
  for(let y=oy-extra2;y<H+extra2;y+=gs){ctx.beginPath();ctx.moveTo(-extra2,y);ctx.lineTo(W+extra2,y);ctx.stroke();}

function drawFx(){particles.forEach(p=>{ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=5;ctx.beginPath();ctx.arc(p.x-cam.x,p.y-cam.y,p.r*p.life,0,Math.PI*2);ctx.fill();ctx.restore();});}

function drawBoss(){
  if(!boss||!boss.alive) return;
  const sx=boss.x-cam.x, sy=boss.y-cam.y;
  const cullM=isDartMode?Math.max(W,H):300;
  if(sx<-cullM||sx>W+cullM||sy<-cullM||sy>H+cullM) return;
  const bd=BLADES[11];

  // Body
  ctx.save();
  const flash=boss.flashTimer>0&&boss.flashTimer%2===0;
  ctx.shadowColor=flash?'#ffffff':'rgba(244,197,66,0.9)';
  ctx.shadowBlur=flash?40:20;
  ctx.beginPath(); ctx.arc(sx,sy,boss.r,0,Math.PI*2);
  const g=ctx.createRadialGradient(sx-12,sy-14,4,sx,sy,boss.r);
  g.addColorStop(0,flash?'#ffffff':'#ffeeaa');
  g.addColorStop(1,flash?'#ffaa00':'#aa6600');
  ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle=flash?'#ffffff':'#f4c542'; ctx.lineWidth=4; ctx.stroke();

  // Eyes (big angry)
  ctx.fillStyle='#ff2200';
  ctx.beginPath(); ctx.arc(sx+16,sy-10,7,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx-16,sy-10,7,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a0000';
  ctx.beginPath(); ctx.arc(sx+18,sy-10,4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx-14,sy-10,4,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Boss blades
  for(let i=0;i<boss.bladeCount;i++){
    const a=boss.orbitAngle+(i/boss.bladeCount)*Math.PI*2;
    const R=boss.r+bd.R;
    bd.d(ctx,sx+Math.cos(a)*R,sy+Math.sin(a)*R,a+Math.PI/2,1.6);
  }

  // HP bar
  ctx.save();
  const barW=boss.r*2.8, barH=13;
  const bx=sx-barW/2, by=sy-boss.r-28;
  // Background
  ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(bx-3,by-3,barW+6,barH+6);
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(bx,by,barW,barH);
  const hpPct=boss.hp/boss.maxHp;
  if(boss.invincible){
    // Shield bar - pulsing blue
    const p=0.6+0.4*Math.sin(Date.now()*0.006);
    ctx.fillStyle=`rgba(80,150,255,${p})`;
    ctx.fillRect(bx,by,barW,barH);
    ctx.fillStyle='#fff'; ctx.font='bold 10px Arial'; ctx.textAlign='center';
    ctx.fillText('🛡️ 无敌入场中...',sx,by-6);
  } else {
    const hpColor=hpPct>0.6?'#44cc44':hpPct>0.3?'#ffaa00':'#ff3333';
    ctx.fillStyle=hpColor;
    ctx.fillRect(bx,by,barW*hpPct,barH);
    // Segment markers every 25%
    ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=2;
    for(let seg=1;seg<4;seg++){ctx.beginPath();ctx.moveTo(bx+barW*seg/4,by);ctx.lineTo(bx+barW*seg/4,by+barH);ctx.stroke();}
    ctx.fillStyle='#fff'; ctx.font='bold 10px Arial'; ctx.textAlign='center';
    ctx.fillText('混沌领主  ❤️'+boss.hp+'/'+boss.maxHp,sx,by-6);
  }
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1; ctx.strokeRect(bx,by,barW,barH);
  ctx.restore();

  // Invincible shield ring
  if(boss.invincible){
    const p=0.5+0.5*Math.sin(Date.now()*0.005);
    ctx.save();
    ctx.globalAlpha=0.7*p;
    ctx.strokeStyle='#4488ff'; ctx.lineWidth=4+p*4;
    ctx.shadowColor='#2255ff'; ctx.shadowBlur=20;
    ctx.beginPath(); ctx.arc(sx,sy,boss.r+12+p*8,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  // Boss projectiles
  boss.projectiles.forEach(p=>{
    const px=p.x-cam.x,py=p.y-cam.y;
    ctx.save();
    if(p.homing){
      // Purple homing orb with pulsing ring
      const pulse=0.7+0.3*Math.sin(Date.now()*0.01);
      ctx.shadowColor='#cc44ff'; ctx.shadowBlur=18*pulse;
      ctx.fillStyle='#aa22ee';
      ctx.beginPath(); ctx.arc(px,py,p.r,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='rgba(220,150,255,0.8)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(px,py,p.r+4*pulse,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle='rgba(255,200,255,0.9)';
      ctx.beginPath(); ctx.arc(px,py,p.r*0.4,0,Math.PI*2); ctx.fill();
    } else {
      ctx.shadowColor='#ff6622'; ctx.shadowBlur=10;
      ctx.fillStyle='#ff4400';
      ctx.beginPath(); ctx.arc(px,py,p.r,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,180,80,0.7)';
      ctx.beginPath(); ctx.arc(px,py,p.r*0.5,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  });

  // Entry animation warning ring
  if(boss.entryTimer>0){
    const alpha=boss.entryTimer*0.6;
    ctx.save(); ctx.globalAlpha=alpha;
    ctx.strokeStyle='#ff2200'; ctx.lineWidth=3;
    ctx.shadowColor='#ff0000'; ctx.shadowBlur=20;
    ctx.beginPath(); ctx.arc(sx,sy,boss.r+30+boss.entryTimer*40,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }
}

// Boss warning arc (minimap arrow)
function drawBossArrow(){
  if(!boss||!boss.alive||!player) return;
  const dx=boss.x-player.x, dy=boss.y-player.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<400) return; // close enough, no arrow needed
  const angle=Math.atan2(dy,dx);
  const margin=40;
  const ax=W/2+Math.cos(angle)*(Math.min(W,H)/2-margin);
  const ay=H/2+Math.sin(angle)*(Math.min(W,H)/2-margin);
  const pulse=0.6+0.4*Math.sin(Date.now()*0.006);
  ctx.save();
  ctx.translate(ax,ay); ctx.rotate(angle);
  ctx.globalAlpha=0.85*pulse;
  ctx.fillStyle='#f4c542'; ctx.shadowColor='#ffaa00'; ctx.shadowBlur=12;
  ctx.beginPath(); ctx.moveTo(16,0); ctx.lineTo(-8,9); ctx.lineTo(-8,-9); ctx.closePath();
  ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 9px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('BOSS',0,0);
  ctx.restore();
}

function drawGroundBlades(){

    // Dropped blade bubble
    if(gb.life!==undefined){const p=0.5+0.5*Math.sin(Date.now()*0.006);ctx.strokeStyle='rgba(255,150,80,0.5)';ctx.lineWidth=2;ctx.shadowColor='#ff8844';ctx.shadowBlur=10*p;ctx.beginPath();ctx.arc(0,0,26,0,Math.PI*2);ctx.stroke();}

    ctx.fillText(gb.isUp?'★'+gb.lv:gb.lv,0,-20);ctx.restore();

function tryLevelUp(){
  if(player.bladeLevel>=MAX_LV)return false;
  player.bladeLevel=Math.min(MAX_LV,player.bladeLevel+1);
  playerMaxLevel=Math.max(playerMaxLevel,player.bladeLevel);
  player.bladeCount=1;
  spawnFx(player.x,player.y,'#ffff44',22);
  SFX.levelUp();
  if(player.bladeLevel===13){showWin();}
  return true;
}

function addBlade(){
  player.bladeCount++;
  if(player.bladeCount>=MAX_BLADES){tryLevelUp();}
}

function update(dt){
  if(!gameRunning||!player||!player.alive)return;
  gameTime+=dt;

  // Movement: WASD + joystick (combine)
  let mx=keys.d-keys.a+jDelta.x, my=keys.s-keys.w+jDelta.y;
  const ml=Math.sqrt(mx*mx+my*my);
  if(ml>1){mx/=ml;my/=ml;}
  const curSpd=isDartMode?player.speed*2:player.speed;
  player.x=Math.max(player.r,Math.min(WORLD-player.r,player.x+mx*curSpd));
  player.y=Math.max(player.r,Math.min(WORLD-player.r,player.y+my*curSpd));
  player.orbitAngle+=ORBIT_SPD*0.04;
  if(reviveShield>0)reviveShield=Math.max(0,reviveShield-dt*60);
  // cam always centers on player
  cam.x=player.x-W/2;cam.y=player.y-H/2;

  // Spawn enemies - fewer as player level rises
  enemyTimer+=dt;
  // No regular enemies during boss fight
  if(!boss||!boss.alive){
    const maxEnemies=isDartMode?80:Math.max(20,50-playerMaxLevel*3);
    const spawnInt=isDartMode?0.4:Math.max(1.2,2.5+playerMaxLevel*0.15);
    if(enemyTimer>spawnInt&&enemies.length<maxEnemies){enemies.push(makeEnemy());enemyTimer=0;}
  }

  // Darts (lv13) - 3 fixed darts that orbit player and auto-hunt enemies
  if(player.bladeLevel===13){
    updateDarts(dt);
  }

  let playerDead=false,bLost=0;

  // ── BOSS UPDATE ──────────────────────────────────────────
  if(boss&&boss.alive&&!playerDead){
    boss.orbitAngle+=0.028; // slower rotation
    boss.entryTimer=Math.max(0,boss.entryTimer-dt);
    if(boss.entryTimer<=0&&boss.invincible){
      boss.invincible=false;
      // Flash to signal vulnerability
      boss.flashTimer=20;
      SFX.levelUp();
    }

    // Move toward player
    const bdx=player.x-boss.x,bdy=player.y-boss.y;
    const bdist=Math.sqrt(bdx*bdx+bdy*bdy);
    if(bdist>1){boss.vx=bdx/bdist*boss.speed;boss.vy=bdy/bdist*boss.speed;}
    boss.x=Math.max(boss.r,Math.min(WORLD-boss.r,boss.x+boss.vx));
    boss.y=Math.max(boss.r,Math.min(WORLD-boss.r,boss.y+boss.vy));

    // Body collision with player
    if(bdist<player.r+boss.r+2&&reviveShield<=0){playerDead=true;spawnFx(player.x,player.y,'#ff3333',25);}

    // Boss blade hits player
    if(!playerDead&&reviveShield<=0){
      const bTips=getBossTips();
      for(const t of bTips){
        const dx=t.x-player.x,dy=t.y-player.y;
        if(dx*dx+dy*dy<(player.r+8)*(player.r+8)){playerDead=true;spawnFx(player.x,player.y,'#ff3333',25);break;}
      }
    }

    // Dart hits boss
    // entryTimer > 0 = fully invincible, darts are repelled
    // hitCooldown prevents multi-hit in same window
    if(boss.hitCooldown===undefined) boss.hitCooldown=0;
    boss.hitCooldown=Math.max(0, boss.hitCooldown-dt);
    for(let i=darts.length-1;i>=0;i--){
      const dart=darts[i];
      if(dart.target!==boss) continue;
      const dx=dart.x-boss.x,dy=dart.y-boss.y;
      const distSq=dx*dx+dy*dy;
      const hitRSq=(boss.r+10)*(boss.r+10);
      if(distSq<hitRSq){
        // Always bounce dart back - must return to player before attacking again
        dart.target=null; dart.state='return'; dart.trail=[];
        dart.mustReturn=true;
        // Only deal damage if NOT invincible
        if(!boss.invincible){
          boss.hp=Math.max(0, boss.hp-1);
          boss.flashTimer=12;
          spawnExplosion(dart.x,dart.y);
          SFX.dartKill();
          if(boss.hp<=0){
            boss.alive=false;
            bossDefeated=true;
            triggerVictory();
          }
        } else {
          spawnFx(dart.x,dart.y,'#4488ff',6);
        }
      }
    }

    // Redirect darts to boss - only if dart is orbiting and has no target
    if(boss.alive){
      darts.forEach(d=>{
        if(d.state==='orbit'&&!d.target){
          d.target=boss; d.state='hunt';
        }
      });
    }

    // Skill 1: fan shot
    if(boss.alive&&boss.entryTimer<=0){
      boss.skillTimer+=dt;
      if(boss.skillTimer>boss.skillCd){
        boss.skillTimer=0;
        boss.skillCd=Math.max(0.8,boss.skillCd-0.05);
        const baseAngle=Math.atan2(player.y-boss.y,player.x-boss.x);
        const fanCount=5;
        for(let fi=0;fi<fanCount;fi++){
          const a=baseAngle+(fi-(fanCount-1)/2)*0.2;
          boss.projectiles.push(makeBossProjectile(a));
        }
        SFX.bladeCrash();
      }
      // Skill 2: homing bullets - 3 homing orbs every 2.5s
      boss.homingTimer+=dt;
      if(boss.homingTimer>boss.homingCd){
        boss.homingTimer=0;
        for(let h=0;h<3;h++){
          const hb=makeBossHomingBullet();
          // slight spread
          const spread=(h-1)*0.3;
          const baseA=Math.atan2(player.y-boss.y,player.x-boss.x)+spread;
          hb.vx=Math.cos(baseA)*5; hb.vy=Math.sin(baseA)*5;
          boss.projectiles.push(hb);
        }
      }
    }

    // Update boss projectiles
    for(let i=boss.projectiles.length-1;i>=0;i--){
      const p=boss.projectiles[i];
      // Homing: slowly steer toward player
      if(p.homing){
        const dx=player.x-p.x,dy=player.y-p.y,dist=Math.sqrt(dx*dx+dy*dy);
        if(dist>1){
          const tx=dx/dist*6,ty=dy/dist*6;
          p.vx+=(tx-p.vx)*0.04; p.vy+=(ty-p.vy)*0.04;
        }
      }
      p.x+=p.vx; p.y+=p.vy; p.life-=dt;
      if(p.life<=0){boss.projectiles.splice(i,1);continue;}
      const dx=p.x-player.x,dy=p.y-player.y;
      if(dx*dx+dy*dy<(player.r+p.r)*(player.r+p.r)&&reviveShield<=0){
        playerDead=true;
        spawnFx(player.x,player.y,'#ff3333',20);
      }
    }
    if(boss.flashTimer>0) boss.flashTimer--;
  }

  // Victory animation
  if(victoryAnim){
    victoryTimer-=dt;
    // Spawn celebration particles
    if(Math.random()<0.4) spawnFx(
      player.x+(Math.random()-0.5)*300,
      player.y+(Math.random()-0.5)*300,
      ['#f4c542','#ff6622','#3355ff','#ff2266','#00ddee'][Math.floor(Math.random()*5)],6);
    if(victoryTimer<=0) showVictoryScreen();
    return;
  }

  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if(!e.alive||playerDead)continue;
    e.orbitAngle+=ORBIT_SPD*0.04;
    e.atCd=Math.max(0,e.atCd-dt);

    // AI
    const dxP=player.x-e.x,dyP=player.y-e.y,distP=Math.sqrt(dxP*dxP+dyP*dyP);
    let tx=null,ty=null;
    if(isDartMode){
      // Dart mode: ALL enemies beeline to player
      tx=player.x;ty=player.y;
    } else {
      let bestDist=Infinity,bestE=null;
      if(e.bladeLevel>=2){
        for(let j=0;j<enemies.length;j++){
          if(j===i||!enemies[j].alive)continue;
          const oe=enemies[j];if(oe.bladeLevel>=e.bladeLevel)continue;
          const dx2=oe.x-e.x,dy2=oe.y-e.y,d2=Math.sqrt(dx2*dx2+dy2*dy2);
          if(d2<320&&d2<bestDist){bestDist=d2;bestE=oe;}
        }
      }
      if(distP<e.aggroRange){tx=player.x;ty=player.y;}
      else if(bestE){tx=bestE.x;ty=bestE.y;}
      else{e.wTimer-=dt;if(e.wTimer<=0){e.wAngle=Math.random()*Math.PI*2;e.wTimer=1.5+Math.random()*2;}tx=e.x+Math.cos(e.wAngle)*100;ty=e.y+Math.sin(e.wAngle)*100;}
    }
    const tdx=tx-e.x,tdy=ty-e.y,td=Math.sqrt(tdx*tdx+tdy*tdy);
    if(td>1){e.vx=tdx/td*e.speed;e.vy=tdy/td*e.speed;}
    e.x=Math.max(e.r,Math.min(WORLD-e.r,e.x+e.vx));
    e.y=Math.max(e.r,Math.min(WORLD-e.r,e.y+e.vy));

    // Body collision
    const bDx=e.x-player.x,bDy=e.y-player.y,bD=Math.sqrt(bDx*bDx+bDy*bDy);
    if(bD<player.r+e.r+2){playerDead=true;spawnFx(player.x,player.y,'#ff3333',20);continue;}

    // Skip blade combat if player is at lv13
    if(player.bladeLevel===13)continue;

    // Enemy blade tips hit player body
    const canHit=player.bladeLevel<e.bladeLevel||!tipHitsTips(e,player);
    if(canHit&&tipHitsBody(e,player)&&reviveShield<=0){playerDead=true;spawnFx(player.x,player.y,'#ff3333',20);continue;}

    // Player blade tips hit enemy body → kill
    if(tipHitsBody(player,e)){
      const upgrade=player.bladeLevel<=e.bladeLevel;
      killEntity(e,true,upgrade);continue;
    }

    // Blade clash
    if(tipHitsTips(player,e)&&e.atCd<=0){
      e.atCd=0.3;
      SFX.bladeCrash();
      if(player.bladeLevel>e.bladeLevel){
        e.bladeCount--;spawnFx(e.x,e.y,BLADES[e.bladeLevel-1].c,5);
        if(e.bladeCount<=0)killEntity(e,true,false);
      } else if(e.bladeLevel>player.bladeLevel){
        if(reviveShield<=0){bLost++;spawnFx(player.x,player.y,'#ff9944',5);}
      } else {
        e.bladeCount--;bLost++;spawnFx(e.x,e.y,BLADES[e.bladeLevel-1].c,5);spawnFx(player.x,player.y,'#ff9944',4);
        if(e.bladeCount<=0)killEntity(e,true,true);
      }
    }
  }

  if(bLost>0&&!playerDead){player.bladeCount=Math.max(0,player.bladeCount-1);if(player.bladeCount<=0&&reviveShield<=0)playerDead=true;}
  if(playerDead){player.alive=false;showDeath();return;}
  enemies=enemies.filter(e=>e.alive);

  // Enemy vs enemy
  for(let i=0;i<enemies.length;i++){
    for(let j=i+1;j<enemies.length;j++){
      const a=enemies[i],b=enemies[j];
      if(!a.alive||!b.alive)continue;
      const dx=a.x-b.x,dy=a.y-b.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<a.r+b.r+2){
        if(a.bladeLevel>b.bladeLevel){killEntity(b,false,false);}
        else if(b.bladeLevel>a.bladeLevel){killEntity(a,false,false);}
        else{killEntity(a,false,false);killEntity(b,false,false);}
        continue;
      }
      if(tipHitsBody(a,b)&&a.bladeLevel>=b.bladeLevel){killEntity(b,false,false);continue;}
      if(tipHitsBody(b,a)&&b.bladeLevel>=a.bladeLevel){killEntity(a,false,false);continue;}
      if(tipHitsTips(a,b)){
        if(a.bladeLevel>b.bladeLevel){b.bladeCount--;if(b.bladeCount<=0)killEntity(b,false,false);}
        else if(b.bladeLevel>a.bladeLevel){a.bladeCount--;if(a.bladeCount<=0)killEntity(a,false,false);}
        else{a.bladeCount--;b.bladeCount--;if(a.bladeCount<=0)killEntity(a,false,false);if(b.bladeCount<=0)killEntity(b,false,false);}
      }
    }
  }
  enemies=enemies.filter(e=>e.alive);

  // Ground blades
  bladeTimer+=dt;
  if(!isDartMode&&bladeTimer>1.8&&groundBlades.length<35){groundBlades.push(makeGround(player.x,player.y));bladeTimer=0;}
  // In dart mode clear any lingering ground blades
  if(isDartMode&&(groundBlades.length>0||droppedBlades.length>0)){groundBlades=[];droppedBlades=[];}
  groundBlades.forEach(gb=>{if(!gb.isUp)gb.lv=player.bladeLevel;gb.bob+=0.05;});
  droppedBlades.forEach(gb=>{gb.life-=dt;gb.bob+=0.05;});
  droppedBlades=droppedBlades.filter(gb=>gb.life>0);

  // Pickups
  const allPickups=[...groundBlades,...droppedBlades];
  for(let i=allPickups.length-1;i>=0;i--){
    const gb=allPickups[i];
    const dx=player.x-gb.x,dy=player.y-gb.y;
    if(dx*dx+dy*dy>(player.r+22)*(player.r+22))continue;
    if(gb.lv>=13)continue; // no dart pickups
    if(gb.isUp){
      if(gb.lv>=player.bladeLevel&&gb.lv<=12){player.bladeLevel=gb.lv;playerMaxLevel=Math.max(playerMaxLevel,player.bladeLevel);addBlade();}
    } else {
      addBlade();
    }
    SFX.pickupBlade();
    spawnFx(gb.x,gb.y,BLADES[Math.min(11,gb.lv-1)].c,10);
    // Remove from original array
    const gi=groundBlades.indexOf(gb);if(gi>=0)groundBlades.splice(gi,1);
    const di=droppedBlades.indexOf(gb);if(di>=0)droppedBlades.splice(di,1);
    updateHUD();
  }

  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.91;p.vy*=0.91;p.life-=0.028;});
  particles=particles.filter(p=>p.life>0);
  score+=Math.floor(dt*2.5);
  if(gameTime%0.5<dt)updateHUD();
}

function draw(){
  ctx.clearRect(0,0,W,H);
  if(isDartMode){
    // Zoom out by scaling around screen center - no black borders
    const zoom=0.52;
    ctx.save();
    ctx.translate(W/2,H/2);
    ctx.scale(zoom,zoom);
    ctx.translate(-W/2,-H/2);
    drawWorld();
    drawGroundBlades();
    drawFx();
    drawDarts();
    if(enemies)enemies.forEach(e=>{if(e.alive)drawEntity(e,false);});
    drawBoss();
    if(player&&player.alive){
    drawWarnings();drawBossArrow();drawEntity(player,true);
    if(reviveShield>0){
      const alpha=(reviveShield%20<10)?0.9:0.4; // flicker
      const t=Date.now()*0.004;
      ctx.save();
      const sx=player.x-cam.x,sy=player.y-cam.y;
      ctx.globalAlpha=alpha*0.7;
      ctx.strokeStyle='#ffcc00';ctx.lineWidth=3;
      ctx.shadowColor='#ffaa00';ctx.shadowBlur=20;
      ctx.beginPath();ctx.arc(sx,sy,player.r+8+Math.sin(t)*4,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=alpha*0.15;
      ctx.fillStyle='#ffcc00';
      ctx.beginPath();ctx.arc(sx,sy,player.r+8,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
  }
    ctx.restore();
  } else {
    drawWorld();
    drawGroundBlades();
    drawFx();
    drawDarts();
    if(enemies)enemies.forEach(e=>{if(e.alive)drawEntity(e,false);});
    drawBoss();
    if(player&&player.alive){
    drawWarnings();drawBossArrow();drawEntity(player,true);
    if(reviveShield>0){
      const alpha=(reviveShield%20<10)?0.9:0.4; // flicker
      const t=Date.now()*0.004;
      ctx.save();
      const sx=player.x-cam.x,sy=player.y-cam.y;
      ctx.globalAlpha=alpha*0.7;
      ctx.strokeStyle='#ffcc00';ctx.lineWidth=3;
      ctx.shadowColor='#ffaa00';ctx.shadowBlur=20;
      ctx.beginPath();ctx.arc(sx,sy,player.r+8+Math.sin(t)*4,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=alpha*0.15;
      ctx.fillStyle='#ffcc00';
      ctx.beginPath();ctx.arc(sx,sy,player.r+8,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
  }
  }
  drawMinimap();
  // Dart mode activation flash
  if(dartModeFlash>0){
    dartModeFlash--;
    const alpha=Math.min(1,dartModeFlash/30);
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.fillStyle='rgba(30,50,180,0.55)';
    ctx.fillRect(0,0,W,H);
    ctx.shadowColor='#88aaff';ctx.shadowBlur=30;
    ctx.fillStyle='#aaccff';
    ctx.font='bold '+Math.floor(W/12)+'px Arial';
    ctx.textAlign='center';ctx.textBaseline='middle';
    if(bossFlash){bossFlash=false;
      ctx.fillText('⚠️ 混沌领主降临',W/2,H/2-20);
      ctx.font='bold '+Math.floor(W/22)+'px Arial';
      ctx.fillStyle='#aa4400';
      ctx.fillText('BOSS INCOMING',W/2,H/2+28);
    } else {
      ctx.fillText('🎯 末日飞镖',W/2,H/2-20);
      ctx.font='bold '+Math.floor(W/22)+'px Arial';
      ctx.fillStyle='#667799';
      ctx.fillText('DART STORM',W/2,H/2+28);
    }
    ctx.restore();
  }
}

function loop(ts){
  const dt=Math.min((ts-lastTime)/1000,0.05);
  lastTime=ts;
  if(gameRunning)update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{lastTime=ts;requestAnimationFrame(loop);});
</script>
</body>
</html>
